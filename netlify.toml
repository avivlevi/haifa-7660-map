[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/ingest/static/*"
  to = "https://us-assets.i.posthog.com/static/:splat"
  status = 200
  force = true
  headers = {X-Forwarded-For = ":remote-addr"}

[[redirects]]
  from = "/ingest/*"
  to = "https://us.i.posthog.com/:splat"
  status = 200
  force = true
  headers = {X-Forwarded-For = ":remote-addr"}

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
